<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Look!Look! 録画</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="recorder.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <span class="logo">🎥 録画</span>
    </div>

    <div class="card" id="setupCard">
      <p class="lead">画面共有を選択して録画を開始します</p>
      <label class="mic-row">
        <input type="checkbox" id="useMic" checked>
        <span>マイク音声も録音する</span>
      </label>
      <label class="field">
        <span>保存ファイル名の接頭辞</span>
        <input type="text" id="filenamePrefix" maxlength="80" placeholder="pointer-recording">
      </label>
      <button class="primary-btn" id="startBtn">
        <span>🔴</span>
        <span>録画を開始</span>
      </button>
      <p class="hint">画面選択ダイアログで「タブの音声を共有」にチェックを入れるとシステム音声も入ります。</p>
    </div>

    <div class="card hidden" id="countdownCard">
      <div class="countdown-wrap">
        <div class="countdown-num" id="countdownNum">3</div>
        <div class="countdown-label">録画が始まります</div>
      </div>
    </div>

    <div class="card hidden" id="recordingCard">
      <div class="status">
        <span class="rec-dot" id="recDot"></span>
        <span id="recLabel">録画中</span>
        <span id="timer">00:00</span>
      </div>
      <div class="rec-actions">
        <button class="pause-btn" id="pauseBtn">
          <span id="pauseIcon">⏸</span>
          <span id="pauseLabel">一時停止</span>
        </button>
        <button class="stop-btn" id="stopBtn">
          <span>⏹</span>
          <span>停止して保存</span>
        </button>
      </div>
    </div>

    <div class="card hidden" id="doneCard">
      <p class="lead">録画を保存しました 🎉</p>
      <p class="done-filename" id="doneFilename"></p>
      <button class="show-btn" id="showFileBtn">
        <span>📂</span>
        <span>Finderで開く</span>
      </button>
      <button class="primary-btn" id="newRecordBtn" style="margin-top:8px">
        <span>🔴</span>
        <span>もう一度録画する</span>
      </button>
    </div>

    <div class="error hidden" id="errorBox"></div>
  </div>
  <script src="lib/storage.js"></script>
  <script src="recorder.js"></script>
</body>
</html>
